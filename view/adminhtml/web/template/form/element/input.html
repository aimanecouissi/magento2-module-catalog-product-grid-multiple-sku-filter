<input class="admin__control-text"
       type="text"
       data-bind="
           event: {change: userChanges},
           value: value,
           hasFocus: focused,
           valueUpdate: valueUpdate,
           attr: {
               name: inputName,
               placeholder: placeholder,
               'aria-describedby': noticeId,
               id: uid,
               disabled: disabled,
               maxlength: 2000
           }
       "
/>
